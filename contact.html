<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>StudentHub — Contact</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <a class="skip-link" href="#main">Skip to main content</a>
  <header role="banner">
    <h1><a href="index.html">StudentHub</a></h1>
  </header>

  <main id="main" role="main">
    <h2>Contact Us</h2>
    <form action="#" method="post" aria-describedby="contact-desc">
      <p id="contact-desc">Send us a message and we'll get back to you.</p>
      <label for="name">Name</label>
      <input id="name" name="name" type="text" required>

      <label for="email">Email</label>
      <input id="email" name="email" type="email" required>

      <label for="message">Message</label>
      <textarea id="message" name="message" rows="6" required></textarea>

      <button type="submit">Send message</button>
    </form>
  </main>

  <footer role="contentinfo">
    <p>&copy; 2026 StudentHub</p>
  </footer>
</body>
</html>
